pipeline:
  raw_data_dir: data/raw
  processed_dir: data/processed
  model_dir: data/models

data:
  synthetic_samples: 10000
  fraud_rate: 0.02
  random_state: 42
  test_size: 0.20
  val_size: 0.10

features:
  numeric:
    - amount
    - hour
    - day_of_week
    - distance_from_home_km
    - num_transactions_last_24h
  binary:
    - card_present
    - is_foreign_transaction
  categorical:
    - merchant_category

model:
  name: random_forest          # logistic_regression | random_forest | gradient_boosting
  optimize_threshold: true
  threshold: 0.5
  params:
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 5
      class_weight: balanced
      n_jobs: -1
      random_state: 42
    logistic_regression:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      random_state: 42
    gradient_boosting:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 5
      subsample: 0.8
      random_state: 42

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  model_filename: random_forest.pkl
  preprocessor_path: data/processed/preprocessor.pkl

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
