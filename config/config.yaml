pipeline:
  raw_data_dir: data/raw
  processed_dir: data/processed
  model_dir: data/models

# IEEE-CIS dataset files (download from Kaggle ieee-fraud-detection)
data:
  txn_file: train_transaction.csv
  identity_file: train_identity.csv
  synthetic_samples: 10000
  fraud_rate: 0.035
  random_state: 42

# Missing-value strategy (notebook section 2 & 3)
missing_values:
  drop_threshold: 0.80         # drop cols with > 80% missing
  flag_threshold: 0.10         # add col_was_missing flag if > 10% missing

# Split strategy: TIME-BASED — never use random split on fraud data (notebook section 11)
split:
  strategy: time_based         # sort by TransactionDT, 80/20 chronological
  test_size: 0.20

# SMOTE: applied ONLY on training set, AFTER the split (notebook section 12)
smote:
  enabled: true
  sampling_strategy: 0.10      # fraud → 10% of training data (not 50% — too aggressive)
  random_state: 42

# Feature groups built in 01_feature_engineering.ipynb
features:
  time:                        # section 5 — decoded from TransactionDT
    - hour
    - day_of_week
    - day_of_month
    - month
    - is_weekend
    - is_night                 # 11pm–6am elevated fraud
    - is_business_hours
  velocity:                    # section 6 — per-card cumulative signals
    - card_txn_count_cumulative
    - card_amt_cumulative
    - time_since_last_txn
    - is_first_txn_for_card
  amount:                      # section 7 — per-card aggregations
    - card_amt_mean
    - card_amt_std
    - card_amt_min
    - card_amt_max
    - card_amt_median
    - amount_z_score           # deviation from card's personal baseline
    - amount_to_mean_ratio
    - log_amount
  interactions:                # section 8 — combined weak signals
    - large_night_txn
    - first_txn_large_amt
    - amount_x_hour
    - high_zscore_night
  categorical:
    target_encode:             # section 9 — CV target encoding (high cardinality)
      - P_emaildomain
      - R_emaildomain
      - card1
    label_encode:              # section 9 — label encoding (low cardinality)
      - ProductCD
      - card4
      - card6

# Model configuration
model:
  name: lightgbm               # logistic_regression | random_forest | gradient_boosting | lightgbm
  optimize_threshold: true
  threshold: 0.5
  params:
    lightgbm:
      n_estimators: 200
      learning_rate: 0.05
      num_leaves: 31
      class_weight: balanced
      random_state: 42
      verbose: -1
      n_jobs: -1
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 5
      class_weight: balanced
      n_jobs: -1
      random_state: 42
    logistic_regression:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      random_state: 42
    gradient_boosting:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 5
      subsample: 0.8
      random_state: 42
      scale_pos_weight: 9      # after SMOTE: ~1:9 ratio

# Evaluation — primary metric is AUC-PR (notebook EDA section 3)
evaluation:
  primary_metric: auc_pr
  secondary_metric: roc_auc
  threshold_opt_metric: f1

# Outputs saved by notebook section 13
processed_outputs:
  - data/processed/X_train.parquet
  - data/processed/y_train.parquet
  - data/processed/X_test.parquet
  - data/processed/y_test.parquet
  - data/processed/feature_cols.json

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  model_filename: lightgbm.pkl
  preprocessor_path: data/processed/preprocessor.pkl

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
