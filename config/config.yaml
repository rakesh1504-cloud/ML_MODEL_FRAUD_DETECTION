pipeline:
  raw_data_dir: data/raw
  processed_dir: data/processed
  model_dir: data/models

# IEEE-CIS dataset files (download from Kaggle ieee-fraud-detection)
data:
  txn_file: train_transaction.csv
  identity_file: train_identity.csv
  synthetic_samples: 10000
  fraud_rate: 0.035
  random_state: 42

# Missing-value strategy (notebook section 2 & 3)
missing_values:
  drop_threshold: 0.80         # drop cols with > 80% missing
  flag_threshold: 0.10         # add col_was_missing flag if > 10% missing

# Split strategy: TIME-BASED — never use random split on fraud data (notebook section 11)
split:
  strategy: time_based         # sort by TransactionDT, 80/20 chronological
  test_size: 0.20

# SMOTE: applied ONLY on training set, AFTER the split (notebook section 12)
smote:
  enabled: true
  sampling_strategy: 0.10      # fraud → 10% of training data (not 50% — too aggressive)
  random_state: 42

# Feature groups built in 01_feature_engineering.ipynb
features:
  time:                        # section 5 — decoded from TransactionDT
    - hour
    - day_of_week
    - day_of_month
    - month
    - is_weekend
    - is_night                 # 11pm–6am elevated fraud
    - is_business_hours
  velocity:                    # section 6 — per-card cumulative signals
    - card_txn_count_cumulative
    - card_amt_cumulative
    - time_since_last_txn
    - is_first_txn_for_card
  amount:                      # section 7 — per-card aggregations
    - card_amt_mean
    - card_amt_std
    - card_amt_min
    - card_amt_max
    - card_amt_median
    - amount_z_score           # deviation from card's personal baseline
    - amount_to_mean_ratio
    - log_amount
  interactions:                # section 8 — combined weak signals
    - large_night_txn
    - first_txn_large_amt
    - amount_x_hour
    - high_zscore_night
  categorical:
    target_encode:             # section 9 — CV target encoding (high cardinality)
      - P_emaildomain
      - R_emaildomain
      - card1
    label_encode:              # section 9 — label encoding (low cardinality)
      - ProductCD
      - card4
      - card6

# Model configuration (notebook 02_modelling sections 2–4)
model:
  name: lightgbm               # logistic_regression | random_forest | gradient_boosting | lightgbm | xgboost
  threshold: 0.5
  params:
    lightgbm:
      n_estimators: 1000
      learning_rate: 0.05
      max_depth: 8
      num_leaves: 63
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 1.0
      class_weight: balanced
      random_state: 42
      verbose: -1
      n_jobs: -1
    xgboost:                   # notebook section 4 — scale_pos_weight auto-computed from class ratio
      n_estimators: 1000
      learning_rate: 0.05
      max_depth: 8
      min_child_weight: 10
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.1
      reg_lambda: 1.0
      eval_metric: aucpr
      early_stopping_rounds: 50
      random_state: 42
      verbosity: 0
      n_jobs: -1
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 5
      class_weight: balanced
      n_jobs: -1
      random_state: 42
    logistic_regression:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      random_state: 42
    gradient_boosting:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 5
      subsample: 0.8
      random_state: 42

# Optuna hyperparameter tuning (notebook section 5)
optuna:
  enabled: false
  n_trials: 50
  direction: maximize           # maximise AUC-PR
  study_name: lgbm_fraud_aucpr
  search_space:
    lightgbm:
      n_estimators: [300, 1500]
      learning_rate: [0.01, 0.2]
      max_depth: [4, 12]
      num_leaves: [20, 200]
      min_child_samples: [10, 100]
      subsample: [0.5, 1.0]
      colsample_bytree: [0.5, 1.0]
      reg_alpha: [1.0e-8, 10.0]
      reg_lambda: [1.0e-8, 10.0]

# Threshold strategy (notebook section 7)
threshold:
  strategy: recall_target       # recall_target | f1
  recall_target: 0.90           # catch >= 90% of fraud; FN cost >> FP cost in banking

# Evaluation — primary metric is AUC-PR (notebook EDA section 3)
evaluation:
  primary_metric: auc_pr        # AUC-PR; accuracy is misleading at 3.5% fraud rate
  secondary_metric: roc_auc
  report_path: data/external/eval_report.json

# Business impact framing (notebook section 11)
business_impact:
  avg_fraud_amt: 250.0          # USD average fraudulent transaction amount
  avg_legit_amt: 100.0          # USD average legitimate transaction amount (FP cost)

# SHAP explainability (notebook section 10)
shap:
  enabled: false
  sample_size: 2000
  output_dir: data/external
  plots:
    - shap_beeswarm.png         # global feature importance (dot plot)
    - shap_bar.png              # mean |SHAP| bar chart
    - shap_waterfall.png        # single high-risk transaction explanation

# MLflow experiment tracking (notebook section 13)
mlflow:
  enabled: false
  experiment: fraud-detection-v1
  tracking_uri: mlruns          # local default; set to DagsHub URI for remote
  dagshub_user: null            # set to your DagsHub username to use remote tracking
  dagshub_repo: fraud-detection
  artefacts:
    - data/external/shap_beeswarm.png
    - data/external/shap_bar.png
    - data/external/shap_waterfall.png
    - data/external/model_comparison_pr.png
    - data/external/model_threshold_tuning.png

# Champion model outputs (notebook section 9 + 12)
champion:
  model_path: models/lgbm_champion.pkl
  threshold_path: models/threshold.json

# Outputs saved by preprocessing
processed_outputs:
  - data/processed/X_train.parquet
  - data/processed/y_train.parquet
  - data/processed/X_test.parquet
  - data/processed/y_test.parquet
  - data/processed/feature_cols.json

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  workers: 2
  # src/api/main.py entry point — loads champion model directly
  entry_point: src.api.main:app
  model_path: models/lgbm_champion.pkl
  threshold_path: models/threshold.json
  features_path: data/processed/feature_cols.json

# Data drift monitoring (notebook 03_deployment section 4)
monitoring:
  enabled: false
  tool: evidently                 # evidently AI drift reports
  reference_data: data/processed/X_train.parquet
  current_data:   data/processed/X_test.parquet
  n_cols: 30                      # top N numeric cols to compare
  ref_sample: 5000
  curr_sample: 2000
  report_path: data/external/drift_report.html

# Deployment targets (notebook 03_deployment section 5 + 8)
deployment:
  docker:
    dockerfile: docker/Dockerfile
    image_name: fraud-api
    port: 8000
  render:
    config: render.yaml
    service_name: fraud-detection-api
    health_check: /health
  streamlit:
    app: streamlit_app/app.py
    port: 8501
    # Update API_URL in streamlit_app/app.py after Render deploy

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
