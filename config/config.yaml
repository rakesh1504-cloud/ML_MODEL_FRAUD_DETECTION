pipeline:
  raw_data_dir: data/raw
  processed_dir: data/processed
  model_dir: data/models

# IEEE-CIS dataset files (download from Kaggle ieee-fraud-detection)
data:
  txn_file: train_transaction.csv
  identity_file: train_identity.csv
  synthetic_samples: 10000
  fraud_rate: 0.035            # ~3.5% in real IEEE-CIS data
  random_state: 42
  test_size: 0.20
  val_size: 0.10

# Missing-value strategy (from EDA section 4 & 9)
missing_values:
  drop_threshold: 0.80         # drop columns with > 80% missing
  flag_threshold: 0.10         # add col_was_missing flag if > 10% missing

features:
  # Derived from TransactionDT (seconds offset from 2017-12-01)
  time:
    - hour
    - day_of_week
    - is_night                 # 11pm–6am elevated fraud (EDA section 6)
    - is_weekend
    - hour_sin
    - hour_cos
    - dow_sin
    - dow_cos
  # Derived from TransactionAmt (EDA section 5)
  amount:
    - log_amount
    - is_large_transaction
    - is_round_amount
  # IEEE-CIS categorical columns (EDA section 7)
  categorical:
    - ProductCD
    - card4
    - card6
    - P_emaildomain
    - R_emaildomain
  # Risk / missingness signals (EDA section 9)
  risk:
    - is_high_risk_product     # ProductCD in {C, S}
    - is_risky_email           # anonymous.com and similar
    - email_domain_mismatch
    - device_missing           # DeviceType missing = fraud signal (lift > 1.5)
    - high_velocity            # C1 > 5

model:
  name: random_forest          # logistic_regression | random_forest | gradient_boosting
  optimize_threshold: true
  threshold: 0.5
  # EDA finding: imbalance ratio ~1:27, set scale_pos_weight accordingly for GBM
  params:
    random_forest:
      n_estimators: 200
      max_depth: 10
      min_samples_leaf: 5
      class_weight: balanced
      n_jobs: -1
      random_state: 42
    logistic_regression:
      C: 1.0
      max_iter: 1000
      class_weight: balanced
      random_state: 42
    gradient_boosting:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 5
      subsample: 0.8
      random_state: 42
      scale_pos_weight: 27     # n_legit / n_fraud (auto-computed if not set)

# EDA finding (section 3): primary metric is AUC-PR, NOT accuracy
evaluation:
  primary_metric: auc_pr
  secondary_metric: roc_auc
  threshold_opt_metric: f1    # metric to optimise decision threshold on val set

api:
  host: 0.0.0.0
  port: 8000
  reload: false
  model_filename: random_forest.pkl
  preprocessor_path: data/processed/preprocessor.pkl

logging:
  level: INFO
  format: "%(asctime)s [%(levelname)s] %(name)s — %(message)s"
